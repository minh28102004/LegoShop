# =============================================================================
# /etc/nginx/sites-available/legoshop
# Production Nginx Config cho Monorepo: 1 Backend (API) + 2 Frontend (Web & Admin)
# =============================================================================

upstream backend_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Hỗ trợ Gzip compression cho toàn bộ site
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Bổ sung Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─────────────────────────────────────────────────────────────────────────
    # 1. API: Proxy pass vào Docker Backend (NestJS)
    # ─────────────────────────────────────────────────────────────────────────
    location /api {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Chuyển tiếp real IP cho backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 2. Admin Frontend: Phục vụ static files tại /var/www/admin
    # ─────────────────────────────────────────────────────────────────────────
    location /admin {
        alias /var/www/admin;
        index index.html;

        # Hỗ trợ SPA Router (trả về index.html nếu không tìm thấy file)
        try_files $uri $uri/ /admin/index.html;

        # Caching: Cache assets 1 năm (dựa trên webpack hash)
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Caching: Không bao giờ cache HTML để luôn nhận script JS mới nhất
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # 3. Web Frontend: Phục vụ static files tại /var/www/web
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        root /var/www/web;
        index index.html;

        # Hỗ trợ SPA Router
        try_files $uri $uri/ /index.html;

        # Caching assets
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Không cache HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
